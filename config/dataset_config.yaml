datasets:
  nslkdd:
    train_url: "https://raw.githubusercontent.com/defcom17/NSL_KDD/master/KDDTrain+.txt"
    test_url: "https://raw.githubusercontent.com/defcom17/NSL_KDD/master/KDDTest+.txt"
    train_file: "data/raw/KDDTrain+.txt"
    test_file: "data/raw/KDDTest+.txt"
    input_dim: 41
    num_classes: 5
    class_names: ["Normal", "DoS", "Probe", "R2L", "U2R"]

  unswnb15:
    train_file: "data/raw/UNSW_NB15_training-set.csv"
    test_file: "data/raw/UNSW_NB15_testing-set.csv"
    input_dim: 49
    num_classes: 10

  mnist:
    data_root: "data/raw/mnist"
    input_dim: 784
    num_classes: 10

partitioning:
  iid:
    type: "iid"
  noniid_moderate:
    type: "noniid"
    alpha: 0.5
  noniid_stress:
    type: "noniid"
    alpha: 0.1

server:
  val_size: 2000
  val_stratified: true
  root_dataset_fraction: 0.02
